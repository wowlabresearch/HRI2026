<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Distance Tone Instrument</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.3/lib/p5.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.3/lib/addons/p5.sound.min.js"></script>
</head>
<body>
  <main class="shell">
    <section class="panel">
      <p class="eyebrow">Web Serial Instrument</p>
      <h1>Distance Pitch / Key Tone</h1>
      <p class="intro"></p>

      <div class="controls">
        <button id="connectBtn" type="button">Connect Serial</button>
        <button id="enableAudioBtn" type="button">Enable Audio</button>
        <button id="disableAudioBtn" type="button" disabled>Disable Audio</button>
      </div>

      <div class="metrics">
        <div class="metric">
          <span class="label">Distance</span>
          <span id="distanceValue" class="value">-- mm</span>
        </div>
        <div class="metric">
          <span class="label">Pitch</span>
          <span id="pitchValue" class="value">-- Hz</span>
        </div>
        <div class="metric">
          <span class="label">Tone</span>
          <span id="toneValue" class="value">Glass</span>
        </div>
        <div class="metric wide">
          <span class="label">Status</span>
          <span id="statusValue" class="value">Idle</span>
        </div>
      </div>

      <div class="legend">
        <p>거리 가까움 = 높은 pitch</p>
        <p>거리 멂 = 낮은 pitch</p>
        <p>Arrow Up = 밝은 tone</p>
        <p>Arrow Down = 어두운 tone</p>
      </div>
    </section>

    <section class="stage">
      <div id="sketch-root"></div>
    </section>
  </main>

  <script src="sketch.js"></script>
</body>
</html>
